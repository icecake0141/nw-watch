<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Watch</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Network Watch - Dual Device Monitor</h1>
            <div class="controls">
                <a class="btn" href="/debug">Debug</a>
                <button id="themeToggle" class="btn" title="Toggle dark mode">🌓 Theme</button>
                <button id="toggleAutoRefresh" class="btn">⏸ Pause Auto-Refresh</button>
                <button id="manualRefresh" class="btn">🔄 Refresh Now</button>
            </div>
            <div class="collector-controls">
                <span id="collectorStatus" class="collector-status status-unknown">Collector: Unknown</span>
                <button id="toggleCollectorMode" class="btn mode-toggle mode-off" aria-pressed="false">Manual Mode OFF</button>
                <button id="runCollectorOnce" class="btn btn-warning collector-manual-run">▶ Run Commands Now</button>
                <button id="toggleCollectorCommands" class="btn btn-warning">⏸ Pause Commands</button>
                <button id="stopCollector" class="btn btn-danger">⏹ Stop Collector</button>
            </div>
        </header>

        <section class="command-tabs">
            <h2>Command Outputs</h2>
            <div class="ping-status command-monitoring-row">
                <h2>Monitoring</h2>
                <div id="monitorPingTiles" class="ping-tiles monitor-ping-tiles">
                    <!-- Standalone monitor ping tiles will be inserted here -->
                </div>
                <div id="devicePingTiles" class="ping-tiles device-ping-tiles">
                    <!-- Device ping tiles will be inserted here -->
                </div>
            </div>
            <div id="commandTabs" class="tabs">
                <!-- Command tabs will be inserted here -->
            </div>
            <div id="commandContent" class="tab-content">
                <!-- Command content will be inserted here -->
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
