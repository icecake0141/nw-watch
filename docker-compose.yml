version: '3.8'

services:
  nw-watch:
    build: .
    container_name: nw-watch
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./control:/app/control
    command: >
      python -m nw_watch.runtime
      --config /app/config.yaml
      --host 0.0.0.0
      --port 8000
      --data-dir /app/data
    environment:
      - DEVICEA_PASSWORD=${DEVICEA_PASSWORD:-}
      - DEVICEB_PASSWORD=${DEVICEB_PASSWORD:-}
    restart: unless-stopped
    networks:
      - nw-watch-network

networks:
  nw-watch-network:
    driver: bridge
